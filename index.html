<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docsify Test Site</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=GDS+Transport:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <link rel="stylesheet" href="./custom.css" />
</head>
<body>
  <header class="tdp-header" role="banner">
    <div class="tdp-header__inner">
      <a class="tdp-header__brand" href="#/">
        <span class="tdp-header__crown">Crown</span>
        <span>Documentation</span>
      </a>
      <div class="tdp-header__meta">Docsify Test Site</div>
    </div>
  </header>

  <main class="tdp-main" id="main-content">
    <div id="app">Loading docs...</div>
  </main>

  <footer class="tdp-footer" role="contentinfo">
    <div class="tdp-footer__inner">
      <span>Test wrapper inspired by Tech Docs Publisher UI</span>
      <a href="https://github.com/sb21460/moj-portal-docsify-test-site">Source repository</a>
    </div>
  </footer>

  <script>
    window.$docsify = {
      name: 'Docsify Test Site',
      repo: 'sb21460/moj-portal-docsify-test-site',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      search: {
        paths: 'auto',
        placeholder: 'Search docs',
        noData: 'No results'
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
</body>
</html>
